#mysql数据库配置
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/oms?serverTimezone=UTC&useUnicode=true&characterEncoding=utf-8
spring.datasource.username=root
spring.datasource.password=
#thymeleaf配置
spring.thymeleaf.prefix=classpath:/templates/
#redis配置
spring.redis.database=0
spring.redis.host=192.168.160.155
spring.redis.port=6379
spring.redis.password=
spring.redis.timeout=1000
#分页插件配置pagehelper
pagehelper.helperDialect=mysql
pagehelper.reasonable=true
pagehelper.supportMethodsArguments=true
pagehelper.params=count=countSql
pagehelper.pagenum=1
pagehelper.pagesize=12
#jwt配置
jwt.secret=ziran2018
jwt.expire=60000
#开启控制台打印sql及mybatis配置
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
#mybatis.mapper-locations=classpath:mapper/*Mapper.xml
#mybatis.config-locations=classpath:mybatis-config.xml
mybatis.type-aliases-package=com.ziyue.immodel.dao
mybatis.configuration.call-setters-on-nulls=true
mybatis.configuration.jdbc-type-for-null=null
mybatis.configuration.map-underscore-to-camel-case=true
